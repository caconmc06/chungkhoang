<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>caconmc.shop - Sắp ra mắt</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #38bdf8, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      opacity: 0.8;
      margin-bottom: 30px;
      font-size: 18px;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      min-width: 70px;
    }

    .box h2 {
      font-size: 28px;
    }

    .box span {
      font-size: 12px;
      opacity: 0.6;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(90deg, #6366f1, #38bdf8);
      border-radius: 999px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    footer {
      margin-top: 30px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>caconmc.shop</h1>
    <p>Website đang được phát triển 🚀<br>Sẽ sớm ra mắt trong thời gian tới</p>

    <div class="countdown">
      <div class="box">
        <h2 id="days">00</h2>
        <span>Ngày</span>
      </div>
      <div class="box">
        <h2 id="hours">00</h2>
        <span>Giờ</span>
      </div>
      <div class="box">
        <h2 id="minutes">00</h2>
        <span>Phút</span>
      </div>
      <div class="box">
        <h2 id="seconds">00</h2>
        <span>Giây</span>
      </div>
    </div>

    <a href="#" class="btn">Thông báo khi ra mắt</a>

    <footer>
      © 2026 caconmc.shop • Build by Cá con MC
    </footer>
  </div>

  <script>
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 7); // 7 ngày nữa

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const m = Math.floor((diff / (1000 * 60)) % 60);
      const s = Math.floor((diff / 1000) % 60);

      document.getElementById("days").innerText = d;
      document.getElementById("hours").innerText = h;
      document.getElementById("minutes").innerText = m;
      document.getElementById("seconds").innerText = s;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
